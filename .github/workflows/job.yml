name: Auto-Update README & Maintainer Activity

on:
  schedule:
    - cron: '0 */1 * * *'  
  workflow_dispatch:          

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Python Script to update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_commits.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-update recent commits" && git push)

  update-maintainers:
    runs-on: ubuntu-latest
    needs: update-readme        # runs after README job to avoid push conflicts
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Maintainer Activity Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_maintainers.py

      - name: Commit and Push maintainers.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase   # pick up the README commit from the first job
          git add maintainers.json
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore: auto-update maintainer activity" && git push)
