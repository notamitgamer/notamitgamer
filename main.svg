<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <style>
      @keyframes matrixRain {
        0% {
          transform: translateY(-30px);
          opacity: 0;
        }
        10% {
          opacity: 0.04;
        }
        90% {
          opacity: 0.04;
        }
        100% {
          transform: translateY(320px);
          opacity: 0;
        }
      }
      
      @keyframes orbitLine1 {
        0% { transform: translate(0, 0); opacity: 1; }
        4% { transform: translate(-180px, 0); opacity: 1; }
        8% { transform: translate(-180px, 80px); opacity: 1; }
        12% { transform: translate(0, 80px); opacity: 1; }
        16% { transform: translate(180px, 80px); opacity: 1; }
        20% { transform: translate(180px, 0); opacity: 1; }
        24% { transform: translate(180px, -80px); opacity: 1; }
        28% { transform: translate(0, -80px); opacity: 1; }
        32% { transform: translate(0, 0); opacity: 1; }
        100% { transform: translate(0, 0); opacity: 1; }
      }
      
      @keyframes orbitLine2 {
        0% { transform: translate(0, 0); opacity: 1; }
        4% { transform: translate(180px, 0); opacity: 1; }
        8% { transform: translate(180px, 80px); opacity: 1; }
        12% { transform: translate(0, 80px); opacity: 1; }
        16% { transform: translate(-180px, 80px); opacity: 1; }
        20% { transform: translate(-180px, 0); opacity: 1; }
        24% { transform: translate(-180px, -80px); opacity: 1; }
        28% { transform: translate(0, -80px); opacity: 1; }
        32% { transform: translate(0, 0); opacity: 1; }
        100% { transform: translate(0, 0); opacity: 1; }
      }
      
      @keyframes orbitLine3 {
        0% { transform: translate(0, 0); opacity: 1; }
        4% { transform: translate(-180px, 0); opacity: 1; }
        8% { transform: translate(-180px, -80px); opacity: 1; }
        12% { transform: translate(0, -80px); opacity: 1; }
        16% { transform: translate(180px, -80px); opacity: 1; }
        20% { transform: translate(180px, 0); opacity: 1; }
        24% { transform: translate(180px, 80px); opacity: 1; }
        28% { transform: translate(0, 80px); opacity: 1; }
        32% { transform: translate(0, 0); opacity: 1; }
        100% { transform: translate(0, 0); opacity: 1; }
      }
      
      @keyframes orbitLine4 {
        0% { transform: translate(0, 0); opacity: 1; }
        4% { transform: translate(180px, 0); opacity: 1; }
        8% { transform: translate(180px, -80px); opacity: 1; }
        12% { transform: translate(0, -80px); opacity: 1; }
        16% { transform: translate(-180px, -80px); opacity: 1; }
        20% { transform: translate(-180px, 0); opacity: 1; }
        24% { transform: translate(-180px, 80px); opacity: 1; }
        28% { transform: translate(0, 80px); opacity: 1; }
        32% { transform: translate(0, 0); opacity: 1; }
        100% { transform: translate(0, 0); opacity: 1; }
      }
      
      @keyframes orbitLine5 {
        0% { transform: translate(0, 0); opacity: 1; }
        4% { transform: translate(0, 80px); opacity: 1; }
        8% { transform: translate(180px, 80px); opacity: 1; }
        12% { transform: translate(180px, 0); opacity: 1; }
        16% { transform: translate(180px, -80px); opacity: 1; }
        20% { transform: translate(0, -80px); opacity: 1; }
        24% { transform: translate(-180px, -80px); opacity: 1; }
        28% { transform: translate(-180px, 0); opacity: 1; }
        32% { transform: translate(0, 0); opacity: 1; }
        100% { transform: translate(0, 0); opacity: 1; }
      }
      
      @keyframes orbitLine6 {
        0% { transform: translate(0, 0); opacity: 1; }
        4% { transform: translate(0, -80px); opacity: 1; }
        8% { transform: translate(-180px, -80px); opacity: 1; }
        12% { transform: translate(-180px, 0); opacity: 1; }
        16% { transform: translate(-180px, 80px); opacity: 1; }
        20% { transform: translate(0, 80px); opacity: 1; }
        24% { transform: translate(180px, 80px); opacity: 1; }
        28% { transform: translate(180px, 0); opacity: 1; }
        32% { transform: translate(0, 0); opacity: 1; }
        100% { transform: translate(0, 0); opacity: 1; }
      }
      
      .line {
        font-family: 'Courier New', 'Fira Code', monospace;
        font-size: 18px;
        fill: #00ff41;
        white-space: pre;
      }
      
      .line1 { animation: orbitLine1 14s cubic-bezier(0.4, 0.0, 0.2, 1) infinite; }
      .line2 { animation: orbitLine2 14s cubic-bezier(0.4, 0.0, 0.2, 1) infinite; animation-delay: 0.35s; }
      .line3 { animation: orbitLine3 14s cubic-bezier(0.4, 0.0, 0.2, 1) infinite; animation-delay: 0.7s; }
      .line4 { animation: orbitLine4 14s cubic-bezier(0.4, 0.0, 0.2, 1) infinite; animation-delay: 1.05s; }
      .line5 { animation: orbitLine5 14s cubic-bezier(0.4, 0.0, 0.2, 1) infinite; animation-delay: 1.4s; }
      .line6 { animation: orbitLine6 14s cubic-bezier(0.4, 0.0, 0.2, 1) infinite; animation-delay: 1.75s; }
      
      .matrix-char {
        font-family: monospace;
        font-size: 10px;
        fill: #00ff41;
        opacity: 0;
        animation: matrixRain 4s linear infinite;
      }
      
      @keyframes spinLoader {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes dashLoader {
        0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
        50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
        100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
      }
      
      .loader-circle {
        transform-origin: 400px 275px;
        animation: spinLoader 1s linear infinite;
      }
      .loader-circle circle {
        animation: dashLoader 1.6s ease-in-out infinite;
      }
    </style>
  </defs>

  <rect width="800" height="320" fill="#0a100a"/>

  <g opacity="0.04">
    <text x="40" y="0" class="matrix-char" style="animation-delay: 0s">010010</text>
    <text x="140" y="0" class="matrix-char" style="animation-delay: 0.5s">101010</text>
    <text x="240" y="0" class="matrix-char" style="animation-delay: 1s">110100</text>
    <text x="340" y="0" class="matrix-char" style="animation-delay: 1.5s">011001</text>
    <text x="440" y="0" class="matrix-char" style="animation-delay: 0.3s">100110</text>
    <text x="540" y="0" class="matrix-char" style="animation-delay: 0.8s">001011</text>
    <text x="640" y="0" class="matrix-char" style="animation-delay: 1.2s">110101</text>
    <text x="740" y="0" class="matrix-char" style="animation-delay: 0.6s">011010</text>
    <text x="90" y="0" class="matrix-char" style="animation-delay: 0.2s">101101</text>
    <text x="290" y="0" class="matrix-char" style="animation-delay: 0.9s">010011</text>
    <text x="490" y="0" class="matrix-char" style="animation-delay: 0.4s">111000</text>
    <text x="690" y="0" class="matrix-char" style="animation-delay: 1.1s">001110</text>
  </g>

  <g>
    <g class="line1">
      <text x="120" y="65" class="line">   █████╗ ███╗        ███╗██╗████████╗</text>
    </g>                                 
    <g class="line2">                     
      <text x="120" y="95" class="line">██╔══██╗████╗   ████║██║╚══██╔══╝ </text>
    </g>                                                
    <g class="line3">
      <text x="120" y="125" class="line">███████║██╔████╔██║██║        ██║   </text>
    </g>
    <g class="line4">
      <text x="120" y="155" class="line">██╔══██║██║╚██╔╝██║██║        ██║    </text>
    </g>
    <g class="line5">
      <text x="120" y="185" class="line">██║     ██║██║ ╚═╝    ██║██║        ██║  </text>
    </g>
    <g class="line6">
      <text x="120" y="215" class="line">╚═╝     ╚═╝╚═╝             ╚═╝╚═╝       ╚═╝    </text>
    </g>
  </g>

  <g transform="translate(400, 285)" class="loader-circle">
    <circle cx="0" cy="0" r="10" fill="none" stroke="#00ff41" stroke-width="1.5" stroke-linecap="round"
            stroke-dasharray="1, 150" stroke-dashoffset="0" opacity="0.6"/>
  </g>
</svg>
